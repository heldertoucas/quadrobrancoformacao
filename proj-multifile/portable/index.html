<!DOCTYPE html>
<html lang="pt-PT" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro Branco v3.0</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Orbitron:wght@400;700&family=Patrick+Hand&family=Quicksand:wght@400;700&family=Raleway:wght@400;700&family=Poppins:wght@400;700&family=VT323&family=Press+Start+2P&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    

    <style>
/* --- 1. THEME & VARIABLES --- */
:root {
    --bg-grad-1: #0f2027;
    --bg-grad-2: #203a43;
    --bg-grad-3: #2c5364;
    --text-color: #ffffff;
    --glass-bg: rgba(255, 255, 255, 0.08);
    --glass-border: rgba(255, 255, 255, 0.15);
    --glass-hover: rgba(255, 255, 255, 0.2);
    --accent-color: #4facfe;
    --danger-color: #ff6b6b;
    --success-color: #51cf66;
    --warn-color: #fcc419;
    --clap-color: #d63384;
    --gold-color: #ffd700;
    --font-main: 'Montserrat', sans-serif;
    --font-serif: 'Playfair Display', serif;

    /* Optical Scaling Defaults */
    --optical-weight: 800;
    --optical-spacing: normal;
    --optical-lh: 1.2;
    --font-size-base: 5rem;
    --modal-overlay: rgba(0, 0, 0, 0.6);
    --expanded-bg: rgba(15, 32, 39, 0.95);
    --input-bg: rgba(0, 0, 0, 0.2);

    /* Poll Bar Colors (v2) */
    --poll-col-1: linear-gradient(180deg, #FF5252, #B71C1C);
    --poll-col-2: linear-gradient(180deg, #448AFF, #1565C0);
    --poll-col-3: linear-gradient(180deg, #69F0AE, #2E7D32);
    --poll-col-4: linear-gradient(180deg, #FFD740, #F9A825);
    --poll-col-5: linear-gradient(180deg, #E040FB, #6A1B9A);
    --poll-col-6: linear-gradient(180deg, #00E5FF, #006064);
}

[data-theme="light"] {
    --bg-grad-1: #dfe9f3;
    --bg-grad-2: #ffffff;
    --bg-grad-3: #fdfbfb;
    --text-color: #1a1a1a;
    --glass-bg: rgba(0, 0, 0, 0.04);
    --glass-border: rgba(0, 0, 0, 0.08);
    --glass-hover: rgba(0, 0, 0, 0.08);
    --accent-color: #005bea;
    --modal-overlay: rgba(255, 255, 255, 0.6);
    --expanded-bg: rgba(255, 255, 255, 0.95);
    --input-bg: rgba(0, 0, 0, 0.05);
}

/* 1. Neon (Cyberpunk) */
[data-theme="neon"] {
    --bg-grad-1: #050510;
    --bg-grad-2: #100b20;
    --bg-grad-3: #0a0a1a;
    --text-color: #e0e0ff;
    --glass-bg: rgba(10, 10, 30, 0.6);
    --glass-border: #00ff9f;
    --glass-hover: rgba(0, 255, 159, 0.1);
    --accent-color: #00ff9f;
    --warn-color: #ff0055;
    --modal-overlay: rgba(0, 5, 20, 0.8);
    --expanded-bg: rgba(5, 5, 20, 0.95);
    --input-bg: rgba(0, 0, 0, 0.5);
    --font-main: 'Orbitron', sans-serif;
    box-shadow: 0 0 10px var(--accent-color);
}

/* 2. Sketch (Papel) */
[data-theme="sketch"] {
    --bg-grad-1: #fdf6e3;
    --bg-grad-2: #fdf6e3;
    --bg-grad-3: #eee8d5;
    --text-color: #2b2b2b;
    --glass-bg: rgba(255, 255, 255, 0.95);
    --glass-border: #2b2b2b;
    --glass-hover: rgba(0, 0, 0, 0.05);
    --accent-color: #d33682;
    --modal-overlay: rgba(255, 248, 220, 0.8);
    --expanded-bg: #fdf6e3;
    --input-bg: rgba(255, 255, 255, 0.5);
    --font-main: 'Patrick Hand', cursive;
}

/* Specific override for Sketch borders */
[data-theme="sketch"] * {
    border-radius: 2px !important;
}

/* 3. Nature (Natureza) */
[data-theme="nature"] {
    --bg-grad-1: #e0f7fa;
    --bg-grad-2: #e8f5e9;
    --bg-grad-3: #c8e6c9;
    --text-color: #2e4a3d;
    --glass-bg: rgba(255, 255, 255, 0.4);
    --glass-border: rgba(255, 255, 255, 0.6);
    --glass-hover: rgba(255, 255, 255, 0.6);
    --accent-color: #00897b;
    --modal-overlay: rgba(230, 245, 235, 0.7);
    --expanded-bg: rgba(240, 255, 245, 0.95);
    --input-bg: rgba(255, 255, 255, 0.3);
    --font-main: 'Quicksand', sans-serif;
}

/* 4. Ocean (Oceano) */
[data-theme="ocean"] {
    --bg-grad-1: #001f3f;
    --bg-grad-2: #003366;
    --bg-grad-3: #004080;
    --text-color: #dbeaff;
    --glass-bg: rgba(0, 30, 60, 0.4);
    --glass-border: rgba(100, 200, 255, 0.2);
    --glass-hover: rgba(100, 200, 255, 0.1);
    --accent-color: #4facfe;
    --modal-overlay: rgba(0, 20, 40, 0.7);
    --expanded-bg: rgba(0, 31, 63, 0.95);
    --input-bg: rgba(0, 0, 0, 0.3);
    --font-main: 'Raleway', sans-serif;
}

/* 5. Sunset (Pôr do Sol) */
[data-theme="sunset"] {
    --bg-grad-1: #2b102f;
    --bg-grad-2: #5b1e3e;
    --bg-grad-3: #8c2d4a;
    --text-color: #ffe3e3;
    --glass-bg: rgba(80, 30, 50, 0.3);
    --glass-border: rgba(255, 100, 100, 0.2);
    --glass-hover: rgba(255, 200, 200, 0.1);
    --accent-color: #ff9f1c;
    --modal-overlay: rgba(43, 16, 47, 0.8);
    --expanded-bg: rgba(91, 30, 62, 0.95);
    --input-bg: rgba(0, 0, 0, 0.3);
    --font-main: 'Poppins', sans-serif;
}

/* 6. Gameboy (Retro) */
[data-theme="gameboy"] {
    --bg-grad-1: #8b956d;
    --bg-grad-2: #8b956d;
    --bg-grad-3: #c4cfa1;
    --text-color: #0f380f;
    --glass-bg: rgba(15, 56, 15, 0.1);
    --glass-border: #0f380f;
    --glass-hover: rgba(15, 56, 15, 0.2);
    --accent-color: #306230;
    --warn-color: #0f380f;
    /* No red in gameboy */
    --modal-overlay: rgba(139, 149, 109, 0.9);
    --expanded-bg: #8b956d;
    --input-bg: rgba(15, 56, 15, 0.1);
    --font-main: 'VT323', monospace;
}

[data-theme="gameboy"] * {
    border-radius: 0 !important;
    /* Sharp edges */
}

/* 7. 8-bit (Arcade) */
[data-theme="8bit"] {
    --bg-grad-1: #000000;
    --bg-grad-2: #1a1a1a;
    --bg-grad-3: #222222;
    --text-color: #ffffff;
    --glass-bg: #000000;
    --glass-border: #ffffff;
    --glass-hover: #333333;
    --accent-color: #ff0044;
    --warn-color: #ffcc00;
    --modal-overlay: rgba(0, 0, 0, 0.9);
    --expanded-bg: #000000;
    --input-bg: #222222;
    --font-main: 'Press Start 2P', cursive;
}

[data-theme="8bit"] * {
    border-radius: 0 !important;
    box-shadow: none !important;
    border-width: 2px !important;
}
/* --- 2. RESET & BASE --- */
* {
    box-sizing: border-box;
    transition: background-color 1s ease-in-out, 
                border-color 1s ease-in-out, 
                color 1s ease-in-out, 
                box-shadow 1s ease-in-out,
                backdrop-filter 1s ease-in-out;
}

body,
html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: var(--font-main);
    color: var(--text-color);
    transition: color 0.5s ease;
    user-select: none;
}

/* Animated Background */
.background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
    background-size: 400% 400%;
    animation: gradientBG 20s ease infinite;
    z-index: -2;
}

/* Sunburst Effect */
.sunburst {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 200vmax;
    height: 200vmax;
    transform: translate(-50%, -50%);
    background: repeating-conic-gradient(from 0deg,
            rgba(255, 215, 0, 0.1) 0deg 15deg,
            transparent 15deg 30deg);
    z-index: -1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s ease;
    animation: rotateSunburst 30s linear infinite;
}

.sunburst.active {
    opacity: 1;
}

/* Utility Classes */
.hidden {
    display: none !important;
}

.visible {
    opacity: 1 !important;
    transform: translateY(0) scale(1) !important;
}

.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
}

/* Focus Management */
button:focus-visible,
input:focus-visible,
textarea:focus-visible {
    outline: 3px solid var(--accent-color);
    outline-offset: 2px;
}

/* Main Display Area */
#display-area {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 5%;
    text-align: center;
    position: relative;
    z-index: 1;
}

h1 {
    --char-count: 1;
    font-size: calc(clamp(1.5rem, calc(6vw * var(--scale-factor, 1)), 6rem) * var(--manual-zoom, 1));
    font-weight: var(--optical-weight, 800);
    letter-spacing: var(--optical-spacing, normal);
    line-height: var(--optical-lh, 1.2);
    margin: 0;
    opacity: 0;
    transform: scale(0.9) translateY(20px);
    transition: font-size 0.2s linear, opacity 0.5s, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    text-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    max-width: 90%;
    word-wrap: break-word;
    white-space: pre-wrap;
    word-break: normal;
}

/* Rich Content Overrides */
h1.rich-content {
    font-weight: normal;
    text-align: initial;
    white-space: normal;
    display: block;
    width: 100%;
}

h1.rich-content b,
h1.rich-content strong {
    font-weight: 900;
}

h1.rich-content i,
h1.rich-content em {
    font-style: italic;
}

h1.rich-content u {
    text-decoration: underline;
}

h1.rich-content ul,
h1.rich-content ol {
    text-align: inherit;
    margin: 0 auto;
    display: inline-block;
    padding-left: 2rem;
}

h1.rich-content li {
    margin-bottom: 5px;
}

h1.serif-mode {
    font-family: var(--font-serif);
    font-style: italic;
    --optical-weight: 400;
    text-shadow: none;
}

.word-span {
    display: inline-block;
    white-space: pre;
    opacity: 0;
    animation: wordFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* Navigation Arrows */
.nav-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 70px;
    height: 70px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 90;
    transition: all 0.3s;
    opacity: 0;
    pointer-events: none;
    backdrop-filter: blur(5px);
    color: var(--text-color);
}

.nav-arrow.visible {
    opacity: 0.6;
    pointer-events: all;
}

.nav-arrow:hover {
    opacity: 1;
    transform: translateY(-50%) scale(1.15);
    background: var(--glass-hover);
}

.nav-arrow.left { left: 30px; }
.nav-arrow.right { right: 30px; }

.nav-arrow svg {
    width: 32px;
    height: 32px;
    stroke: currentColor;
    stroke-width: 2.5;
    fill: none;
}

.nav-queue-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    background: var(--accent-color);
    color: white;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 0.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
}

/* STARTUP MESSAGE */
#startup-message {
    position: fixed;
    top: 20px;
    left: 0;
    right: 0;
    margin-left: auto;
    margin-right: auto;
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    color: var(--text-color);
    font-size: 0.9rem;
    text-align: center;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 1s ease, visibility 1s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    width: fit-content;
    max-width: 90%;
    pointer-events: none;
}

#startup-message.visible {
    opacity: 1;
    visibility: visible;
}

/* Projector Mode Overrides */
body.projector-mode #control-panel,
body.projector-mode #logo-area,
body.projector-mode .nav-arrow {
    display: none !important;
}

body.projector-mode #display-area {
    padding-bottom: 0;
}

/* ZEN MODE - IDLE STATE */
body[data-mode="simple"] #logo-area,
body[data-mode="simple"] #control-panel,
body[data-mode="simple"] .nav-arrow,
body[data-mode="simple"] .input-wrapper {
    transition: opacity 0.5s ease, transform 0.5s ease;
}

body[data-mode="simple"].idle #logo-area {
    opacity: 0;
    pointer-events: none;
    transform: translateY(-20px);
}

body[data-mode="simple"].idle #control-panel {
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
}

body[data-mode="simple"].idle .nav-arrow {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.8);
}

body[data-mode="simple"].idle .input-wrapper {
    opacity: 0;
    pointer-events: none;
}
/* --- 3. UI COMPONENTS --- */

/* Logo & Menu */
#logo-area {
    position: absolute;
    top: 30px;
    left: 40px;
    z-index: 200;
}

#logo-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0.9;
    transition: opacity 0.2s;
    padding: 5px;
    border-radius: 8px;
}

#logo-btn:hover {
    opacity: 1;
    background: var(--glass-hover);
}

#app-logo {
    height: 80px;
    width: auto;
    object-fit: contain;
    pointer-events: none;
}

#logo-arrow {
    font-size: 0.8rem;
    color: var(--text-color);
    opacity: 0.5;
    transition: transform 0.3s;
}

#logo-area.active #logo-arrow {
    transform: rotate(180deg);
}

.dropdown-menu {
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 10px;
    width: 260px;
    max-height: 75vh;
    overflow-y: auto;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 10px;
    display: none;
    flex-direction: column;
    gap: 2px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    animation: fadeInMenu 0.2s ease-out;
    scrollbar-width: thin;
    scrollbar-color: var(--accent-color) transparent;
}

.dropdown-menu::-webkit-scrollbar { width: 6px; }
.dropdown-menu::-webkit-scrollbar-thumb {
    background-color: var(--accent-color);
    border-radius: 10px;
}

#logo-area.active .dropdown-menu { display: flex; }

.menu-category {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.5;
    padding: 8px 10px 4px;
    margin-top: 5px;
}

.menu-item {
    padding: 10px 15px;
    font-size: 0.9rem;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-color);
    opacity: 0.9;
    background: transparent;
    border: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
}

.menu-item:hover { background: var(--glass-hover); opacity: 1; }
.menu-item.active { background: var(--glass-hover); opacity: 1; font-weight: 600; }

.menu-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1px solid currentColor;
    opacity: 0.5;
    background: transparent;
}

.menu-item.active .menu-dot {
    background: var(--accent-color);
    border-color: var(--accent-color);
    opacity: 1;
}

.menu-divider {
    height: 1px;
    background: var(--glass-border);
    margin: 6px 0;
    opacity: 0.5;
}

.icon-hamburger {
    display: none;
    width: 24px;
    height: 24px;
    stroke: var(--text-color);
    stroke-width: 2;
    stroke-linecap: round;
}

@media (max-width: 900px) {
    #logo-area { top: 15px; left: 15px; }
    #app-logo, #logo-arrow { display: none; }
    .icon-hamburger { display: block; }
    #logo-btn {
        padding: 10px;
        background: var(--glass-bg);
        backdrop-filter: blur(5px);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        opacity: 0.8;
        z-index: 1001;
    }
    #logo-area::before {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(3px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 999;
    }
    #logo-area.active::before { opacity: 1; pointer-events: auto; }
    .dropdown-menu {
        position: fixed;
        top: auto; bottom: 0; left: 0;
        width: 100vw;
        margin: 0;
        border-radius: 24px 24px 0 0;
        padding: 20px 15px 40px;
        max-height: 85vh;
        overflow-y: auto;
        transform: translateY(100%);
        animation: none;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        border: none;
        border-top: 1px solid var(--glass-border);
        background: var(--expanded-bg);
        z-index: 1000;
        box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        display: flex;
    }
    .dropdown-menu::before {
        content: '';
        display: block;
        width: 40px;
        height: 4px;
        background: var(--glass-border);
        border-radius: 4px;
        margin: 0 auto 15px auto;
    }
    #logo-area.active .dropdown-menu { transform: translateY(0); }
    .menu-item { padding: 12px 15px; font-size: 1rem; }
    .menu-close-btn {
        display: flex;
        position: absolute;
        top: 15px; right: 15px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: var(--text-color);
        width: 32px; height: 32px;
        border-radius: 50%;
        font-size: 1.2rem;
        cursor: pointer;
        z-index: 1002;
        align-items: center;
        justify-content: center;
    }
}

.menu-close-btn { display: none; }

/* --- 4. CONTROL PANEL --- */
#control-panel {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 75%;
    max-width: 900px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    border: 1px solid var(--glass-border);
    padding: 15px;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0.7;
    z-index: 100;
}

#control-panel.expanded {
    border-radius: 20px;
    padding: 20px;
    background: var(--expanded-bg);
}

#control-panel:hover,
#control-panel:focus-within,
#control-panel.drawer-open {
    opacity: 1;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
}

/* Toolbar */
#toolbar {
    display: flex;
    gap: 8px;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    margin-bottom: 0;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

#rich-toolbar {
    display: none;
    gap: 5px;
    width: fit-content;
    margin: 0 auto 10px auto;
    justify-content: center;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--glass-border);
    animation: fadeInMenu 0.3s ease;
    overflow-x: auto;
    white-space: nowrap;
    z-index: 1000;
}

#rich-toolbar::-webkit-scrollbar { display: none; }

#control-panel.expanded #rich-toolbar { display: flex; }

.fmt-btn {
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--text-color);
    border-radius: 4px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 0.8rem;
    opacity: 0.7;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    flex-shrink: 0;
}

.fmt-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
}

.submenu-close {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--text-color);
    opacity: 0.5;

class AudioService {
    static init() {
        if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    static toggle(key) {
        this.init();
        if (state.activeSounds[key]) {
            const sound = state.activeSounds[key];
            if (sound.audio) { sound.audio.pause(); sound.audio.currentTime = 0; }
            delete state.activeSounds[key];
            ui.highlightSound(key, false);
            if (key === 'trophy') document.getElementById('sunburst').classList.remove('active');
            return;
        }

        const url = SOUNDS[key];
        const isLoop = ['drum', 'clap', 'palmas'].includes(key);

        if (url) {
            const audio = new Audio(url);
            audio.loop = isLoop;
            state.activeSounds[key] = { audio };
            ui.highlightSound(key, true);

            if (!isLoop) audio.onended = () => {
                delete state.activeSounds[key];
                ui.highlightSound(key, false);
                if (key === 'trophy') document.getElementById('sunburst').classList.remove('active');
            };

            audio.play().catch(() => this.playSynth(key));
        } else {
            this.playSynth(key);
        }

        if (key === 'fanfare' || key === 'trophy') ui.confetti();
        if (key === 'trophy') document.getElementById('sunburst').classList.add('active');
    }

    static playSynth(key) {
        console.warn("Audio fallback triggered for", key);
    }
}

class ModalSystem {
    constructor() {
        this.overlay = document.getElementById('modal-overlay');
        this.title = document.getElementById('modal-title');
        this.body = document.getElementById('modal-body');
        this.btnConfirm = document.getElementById('modal-confirm');
        this.btnCancel = document.getElementById('modal-cancel');
        this.lastFocusedElement = null;

        this.btnCancel.onclick = () => this.close();
        this.resolvePromise = null;

        this.overlay.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') this.close(null);
            if (e.key === 'Tab') {
                const focusableElements = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';
                const content = this.overlay.querySelectorAll(focusableElements);
                const first = content[0];
                const last = content[content.length - 1];

                if (e.shiftKey) {
                    if (document.activeElement === first) { last.focus(); e.preventDefault(); }
                } else {
                    if (document.activeElement === last) { first.focus(); e.preventDefault(); }
                }
            }
        });
    }

    show({ title, html, confirmText = 'Confirmar', showCancel = true }) {
        this.lastFocusedElement = document.activeElement;
        this.title.innerText = title;
        this.body.innerHTML = DOMPurify.sanitize(html);
        this.btnConfirm.innerText = confirmText;
        this.btnCancel.style.display = showCancel ? 'block' : 'none';
        this.overlay.classList.add('open');
        this.overlay.setAttribute('aria-hidden', 'false');

        setTimeout(() => {
            const input = this.body.querySelector('input, textarea');
            if (input) input.focus();
            else this.btnConfirm.focus();
        }, 100);

        return new Promise((resolve) => {
            this.resolvePromise = resolve;
            this.btnConfirm.onclick = () => {
                const field = this.body.querySelector('input, textarea');
                const val = field ? field.value : true;
                this.close(val);
            };
            this.btnCancel.onclick = () => this.close(null);
        });
    }

    close(val = null) {
        this.overlay.classList.remove('open');
        this.overlay.setAttribute('aria-hidden', 'true');
        if (this.resolvePromise) {
            this.resolvePromise(val);
            this.resolvePromise = null;
        }
        if (this.lastFocusedElement) this.lastFocusedElement.focus();
    }
}
const modal = new ModalSystem();

const ui = {
    els: {
        mainText: document.getElementById('main-text'),
        qrContainer: document.getElementById('qr-container'),
        qrWrapper: document.getElementById('qr-canvas-wrapper'),
        input: document.getElementById('input-text'),
        root: document.documentElement
    },

    init() {
        this.renderSoundDrawer();
        this.showStartupMessage();
        this.applyState();
        
        document.addEventListener('selectionchange', () => {
            if (state.isExpanded) this.updateFormatButtons();
        });
        
        const params = new URLSearchParams(window.location.search);

        if (params.has('program')) app.setBrand(params.get('program'));
        if (params.has('mode')) app.setMode(params.get('mode'));
        if (params.has('theme')) app.setTheme(params.get('theme'));
        if (params.has('sons')) this.toggleSoundDrawer();

        if (params.has('timer')) {
            const min = parseInt(params.get('timer'));
            if (!isNaN(min)) features.timer.start(min);
        }

        if (params.has('placar')) {
            const n = parseInt(params.get('placar'));
            if (!isNaN(n)) features.score.build(n);
        } else if (params.has('dados')) {
            features.dice.roll();
        } else if (params.has('sorteio')) {
            const names = params.get('sorteio').split(',').map(s => s.trim()).filter(Boolean);
            if (names.length > 0) features.picker.run(names);
        } else if (params.has('qrcode')) {
            features.setView('qr', params.get('qrcode'));
        } else if (params.has('text')) {
            app.showContent(params.get('text'));
        } else {
            this.updateDisplay("Olá! Vamos começar?");
        }

        state.channel = new BroadcastChannel('quadro_branco_sync');
        state.channel.onmessage = (e) => app.handleBroadcast(e.data);

        if (params.get('mode') === 'projector') {
            document.body.classList.add('projector-mode');
            setTimeout(() => {
                if (state.channel) state.channel.postMessage({ type: 'request_sync' });
            }, 500);
        }

        let idleTimer;
        const resetIdle = () => {
            if (document.body.classList.contains('idle')) document.body.classList.remove('idle');
            if (idleTimer) clearTimeout(idleTimer);
            if (state.mode === 'simple') {
                idleTimer = setTimeout(() => {
                    if (state.mode === 'simple') document.body.classList.add('idle');
                }, 2000);
            }
        };

        resetIdle();
        document.addEventListener('mousemove', resetIdle);
        document.addEventListener('keydown', resetIdle);
        document.addEventListener('click', resetIdle);
        document.addEventListener('touchstart', resetIdle);

        document.addEventListener('click', (e) => {
            if (!document.getElementById('logo-area').contains(e.target)) {
                document.getElementById('logo-area').classList.remove('active');
                if (window.innerWidth <= 900) document.body.style.overflow = '';
            }
        });

        document.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                let zoom = parseFloat(document.documentElement.style.getPropertyValue('--manual-zoom')) || 1;
                if (e.deltaY < 0) zoom += 0.1;
                else zoom -= 0.1;
                zoom = Math.max(0.5, Math.min(zoom, 5));
                document.documentElement.style.setProperty('--manual-zoom', zoom);
            }
        }, { passive: false });

        this.els.input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !state.isExpanded) {
                e.preventDefault();
                app.processInput();
            }
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                app.manualSubmit();
            }
            if (e.key === 'Enter' && e.shiftKey) {
                e.preventDefault();
                app.addToQueue();
            }
        });
    },

    renderSoundDrawer() {
        const drawer = document.getElementById('sound-drawer');
        const allowedLabels = ['clap', 'palmas', 'pointUp', 'pointDown'];
        drawer.innerHTML = '<button class="submenu-close" onclick="ui.toggleSoundDrawer()" title="Fechar">×</button>' +
            SOUND_METADATA.map(s => `
            <button id="btn-${s.id}" class="tool-btn sound-drawer-btn" onclick="AudioService.toggle('${s.id}')" title="${s.label}">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" style="stroke:${s.color}">${ICONS[s.icon]}</svg>
                ${allowedLabels.includes(s.id) ? `<span>${s.label}</span>` : ''}
            </button>
        `).join('');
    },

    animateTextIn(text, element) {
        element.innerHTML = '';
        const words = text.split(/(\s+)/);
        words.forEach((word, index) => {
            const span = document.createElement('span');
            span.className = 'word-span';
            span.style.animationDelay = `${index * 0.05}s`;
            span.innerText = word;
            element.appendChild(span);
        });
    },

    updateDisplay(text, isQR = false) {
        const isHtml = /<[a-z][\s\S]*>/i.test(text) || text.includes('style=') || text.includes('<b>') || text.includes('<i>');
        let processedText = text;
        if (!isHtml) {
            processedText = text.split(/(\s+)/).map(word => {
                if (word.includes('/') || word.includes('www.') || word.match(/\.[a-z]{2,}/i) || word.length > 25) {
                    return word.replace(/([/.\-?=&_])/g, '$1\u200B');
                }
                return word;
            }).join('');
        } else if (!text.includes(' ') && text.length > 30) {
            processedText = text.replace(/([/.\-?=&_])/g, '$1\u200B');
        }

        if (!isQR) this.updateOpticalScaling(processedText.length);

        if (isHtml && !isQR) {
            this.els.mainText.classList.add('rich-content');
            // Sanitize untrusted HTML
            this.els.mainText.innerHTML = DOMPurify.sanitize(processedText);
        } else {
            this.els.mainText.classList.remove('rich-content');
            if (state.isAnimated && !isQR && processedText) {
                this.animateTextIn(processedText, this.els.mainText);
            } else {
                this.els.mainText.innerText = processedText;
            }
        }

        this.els.mainText.classList.toggle('serif-mode', state.isSerif);
        this.els.mainText.classList.remove('hidden');
        this.els.mainText.classList.add('visible');

        if (isQR) {
            this.els.qrContainer.style.display = 'block';
            this.els.qrWrapper.innerHTML = "";
            const canvas = document.createElement('canvas');
            this.els.qrWrapper.appendChild(canvas);
            new QRious({ element: canvas, value: (isHtml ? this.els.mainText.innerText : processedText), size: 256, level: 'H' });
        } else {
            this.els.qrContainer.style.display = 'none';
        }
    },

    updateOpticalScaling(charCount) {
        let factor = 1.0;
        if (charCount > 15) factor = Math.max(0.35, 1.0 - ((charCount - 15) * 0.005));
        const weight = Math.round(500 + (factor - 0.35) * (400 / 0.65));
        const spacing = (0.05 * (1.0 - factor) / 0.65).toFixed(3) + 'em';
        const lh = (1.5 - (factor - 0.35) * (0.4 / 0.65)).toFixed(2);

        this.els.mainText.style.setProperty('--scale-factor', factor);
        this.els.mainText.style.setProperty('--optical-weight', weight);
        this.els.mainText.style.setProperty('--optical-spacing', spacing);
        this.els.mainText.style.setProperty('--optical-lh', lh);
    },

    toggleQR() { features.qr.toggle(); },
    closeQR() { this.els.qrContainer.style.display = 'none'; this.els.input.focus(); },

    toggleExpand() {
        state.isExpanded = !state.isExpanded;
        document.getElementById('control-panel').classList.toggle('expanded', state.isExpanded);
        this.els.input.setAttribute('placeholder', state.isExpanded ? "Modo Texto Rico..." : "Escreva... (Shift+Enter para Fila)");
        this.els.input.focus();
        if (state.isExpanded) this.updateFormatButtons();
    },

    updateFormatButtons() {
        const commands = [
            { id: 'fmt-bold', cmd: 'bold' },
            { id: 'fmt-italic', cmd: 'italic' },
            { id: 'fmt-underline', cmd: 'underline' },
            { id: 'fmt-list', cmd: 'insertUnorderedList' },
            { id: 'fmt-num', cmd: 'insertOrderedList' }
        ];
        commands.forEach(c => {
            const btn = document.getElementById(c.id);
            if (btn) btn.classList.toggle('active', document.queryCommandState(c.cmd));
        });

        ['left', 'center', 'right'].forEach(align => {
            const btn = document.getElementById(`fmt-${align}`);
            if (btn) btn.classList.toggle('active', state.textAlignment === align);
        });

        const btnSerif = document.getElementById('btn-serif');
        if (btnSerif) btnSerif.classList.toggle('active', state.isSerif);

        const btnHighlight = document.getElementById('btn-highlight');
        if (btnHighlight) btnHighlight.classList.toggle('active', state.isHighlight);

        const btnAnimate = document.getElementById('btn-animate');
        if (btnAnimate) btnAnimate.classList.toggle('active', state.isAnimated);
    },

    toggleAnimations() { state.isAnimated = !state.isAnimated; this.applyState(); app.broadcastState(); },
    toggleSerif() { state.isSerif = !state.isSerif; this.applyState(); app.broadcastState(); },
    setTextAlignment(align) { state.textAlignment = align; this.applyState(); app.broadcastState(); },
    toggleHighlight() { state.isHighlight = !state.isHighlight; this.applyState(); app.broadcastState(); },
    toggleSoundDrawer() { document.getElementById('sound-drawer').classList.toggle('open'); document.getElementById('btn-sound-drawer').classList.toggle('active'); },

    toggleLinkMenu() {
        const drawer = document.getElementById('links-drawer');
        const btn = document.getElementById('btn-links');
        const inputWrap = document.querySelector('.input-wrapper');
        const isOpening = !drawer.classList.contains('visible');

        drawer.classList.toggle('visible', isOpening);
        btn.classList.toggle('active', isOpening);

        if (isOpening) {
            inputWrap.style.display = 'none';
            setTimeout(() => {
                const closeFn = (e) => {
                    if (!drawer.contains(e.target) && !btn.contains(e.target)) {
                        drawer.classList.remove('visible');
                        btn.classList.remove('active');
                        inputWrap.style.display = 'flex';
                        document.removeEventListener('click', closeFn);
                    }
                };
                document.addEventListener('click', closeFn);
            }, 0);
        } else {
            inputWrap.style.display = 'flex';
        }
    },

    showToast(msg) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.cssText = `
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 20px; z-index: 2000; animation: fadeInOut 2s ease forwards;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); backdrop-filter: blur(5px);
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    },

    highlightSound(id, active) {
        const btn = document.getElementById(`btn-${id}`);
        if (btn) active ? btn.classList.add('sound-playing') : btn.classList.remove('sound-playing');
    },

    applyState() {
        document.body.setAttribute('data-mode', state.mode);
        this.els.root.setAttribute('data-theme', state.theme);

        const b = BRANDS[state.brand];
        if (b) {
            const img = document.getElementById('app-logo');
            img.src = state.theme === 'light' ? b.light : b.dark;
            img.alt = b.name;
        }

        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        [`brand-${state.brand}`, `mode-${state.mode}`, `theme-${state.theme}`].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.add('active');
        });

        const btnSerif = document.getElementById('btn-serif');
        const btnHighlight = document.getElementById('btn-highlight');
        const btnAnimate = document.getElementById('btn-animate');
        if (btnSerif) btnSerif.classList.toggle('active', state.isSerif);
        if (btnHighlight) btnHighlight.classList.toggle('active', state.isHighlight);
        if (btnAnimate) btnAnimate.classList.toggle('active', state.isAnimated);

        this.els.mainText.classList.toggle('serif-mode', state.isSerif);
        this.els.mainText.classList.toggle('highlight-mode', state.isHighlight);
        this.els.mainText.style.textAlign = state.textAlignment;

        this.updateFormatButtons();
        if (features.ink.active) features.ink.renderPalette();

        const slideBtn = document.getElementById('btn-create-slide');
        const linkBtn = document.getElementById('btn-links');
        if (slideBtn) {
            if (state.brand === 'futuro') {
                slideBtn.classList.remove('hidden');
                linkBtn.classList.remove('hidden');
            } else {
                slideBtn.classList.add('hidden');
                linkBtn.classList.add('hidden');
                document.getElementById('slide-inline-controls').classList.remove('visible');
                document.getElementById('btn-send').style.display = 'block';
            }
        }
    },

    updateQueueBadge() {
        const el = document.getElementById('nav-queue-count');
        const info = document.getElementById('queue-info-badge');
        if (state.queue.length > 0) {
            el.innerText = state.queue.length;
            el.classList.remove('hidden');
            info.innerText = `${state.queue.length} em espera`;
            info.classList.add('visible');
            document.getElementById('nav-right').classList.add('visible');
        } else {
            el.classList.add('hidden');
            info.classList.remove('visible');
            if (state.historyIndex >= state.history.length - 1) document.getElementById('nav-right').classList.remove('visible');
        }
    },

    navControls() {
        document.getElementById('nav-left').classList.toggle('visible', state.historyIndex > 0);
        const canFwd = state.historyIndex < state.history.length - 1 || state.queue.length > 0;
        document.getElementById('nav-right').classList.toggle('visible', canFwd);
    },

    confetti(customColors) {
        const colors = customColors || ['#4facfe', '#00f2fe', '#ffffff'];
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: colors });
    },

    showStartupMessage() {
        const msg = document.getElementById('startup-message');
        if (msg) {
            setTimeout(() => msg.classList.add('visible'), 100);
            setTimeout(() => {
                msg.classList.remove('visible');
                setTimeout(() => msg.remove(), 1000);
            }, 3100);
        }
    }
};

function handleLogoAreaClick(e) {

/* --- 5. FEATURES & LOGIC --- */

const features = {
    setView(mode, data = null) {
        if (mode !== 'trophy') {
            const sb = document.getElementById('sunburst');
            if (sb) sb.classList.remove('active');
        }

        if (state.view === mode && !data) return;
        state.view = mode;

        ui.els.mainText.classList.remove('hidden', 'visible', 'rich-content');
        ui.els.mainText.style.display = 'none';
        ui.els.qrContainer.style.display = 'none';
        document.getElementById('scoreboard').style.display = 'none';

        switch (mode) {
            case 'text':
                ui.els.mainText.style.display = 'block';
                const isHtml = data && (/<[a-z][\s\S]*>/i.test(data) || data.includes('style=') || data.includes('<b>'));
                if (isHtml) {
                    ui.els.mainText.classList.add('rich-content');
                    ui.els.mainText.innerHTML = DOMPurify.sanitize(data);
                } else {
                    ui.els.mainText.innerText = data || "";
                }
                void ui.els.mainText.offsetWidth;
                ui.els.mainText.classList.add('visible');
                break;

            case 'qr':
                ui.els.qrContainer.style.display = 'block';
                ui.els.qrWrapper.innerHTML = `
                    <div style="font-size:1.2rem; margin-bottom:1.5rem; color:var(--accent-color); font-weight:600; text-align:center; max-width:400px; word-break:break-all;">
                        ${data}
                    </div>
                `;
                const canvas = document.createElement('canvas');
                ui.els.qrWrapper.appendChild(canvas);
                new QRious({ element: canvas, value: data, size: 280, level: 'H' });
                break;

            case 'dice':
                ui.els.mainText.style.display = 'block';
                ui.els.mainText.innerHTML = `
                    <div class="dice-wrapper">
                        <div id="dice-result" class="dice-result">A lançar...</div>
                        <div class="dice-visuals dice-shake"><span id="d1"></span><span id="d2"></span></div>
                    </div>`;
                ui.els.mainText.classList.add('visible');
                break;

            case 'picker':
                ui.els.mainText.style.display = 'flex';
                ui.els.mainText.style.alignItems = 'center';
                ui.els.mainText.style.justifyContent = 'center';
                ui.els.mainText.innerHTML = '<div id="picker-result" style="font-size:4rem; font-weight:800; color:var(--accent-color); animation: pulse 0.5s infinite alternate;">Sorteando...</div>';
                ui.els.mainText.classList.add('visible');
                break;
        }
        app.broadcastState();
    },

    timer: {
        async setup() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
                document.getElementById('timer-overlay').style.display = 'none';
                return;
            }
            const min = await modal.show({
                title: 'Definir Timer',
                html: '<input type="number" class="modal-input" placeholder="Minutos (ex: 5)" value="5" min="1">'
            });
            if (min) this.start(parseInt(min));
        },
        start(min) {
            let time = min * 60;
            const el = document.getElementById('timer-overlay');
            el.style.display = 'block';
            el.style.color = '';

            const update = () => {
                el.innerText = `${Math.floor(time / 60).toString().padStart(2, '0')}:${(time % 60).toString().padStart(2, '0')}`;
            };
            update();

            state.timerInterval = setInterval(() => {
                time--;
                update();
                if (time <= 0) {
                    clearInterval(state.timerInterval);
                    state.timerInterval = null;
                    el.style.color = '#ff4b4b';
                    AudioService.toggle('success');
                    ui.confetti();
                    setTimeout(() => { el.style.display = 'none'; }, 5000);
                }
            }, 1000);
        }
    },

    dice: {
        roll() {
            if (state.view === 'dice') { app.clear(); return; }
            features.setView('dice');
            const diceChars = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            let rolls = 0;
            const interval = setInterval(() => {
                const v1 = Math.floor(Math.random() * 6);
                const v2 = Math.floor(Math.random() * 6);
                const d1 = document.getElementById('d1'), d2 = document.getElementById('d2');
                if (d1) d1.innerText = diceChars[v1];
                if (d2) d2.innerText = diceChars[v2];
                if (++rolls >= 20) {
                    clearInterval(interval);
                    const vis = document.querySelector('.dice-visuals');
                    if (vis) vis.classList.remove('dice-shake');
                    const res = document.getElementById('dice-result');
                    if (res) {
                        res.innerText = (v1 + v2 + 2);
                        res.classList.add('show');
                        AudioService.toggle('success');
                    }
                }
            }, 80);
        }
    },

    picker: {
        async setup() {
            const text = await modal.show({
                title: 'Sorteio Aleatório',
                html: '<textarea class="modal-input" placeholder="Nomes separados por vírgula" rows="4"></textarea>'
            });
            if (text) this.run(text.split(',').map(s => s.trim()).filter(Boolean));
        },
        run(names) {
            if (names.length < 2) return;
            features.setView('picker');
            const resEl = document.getElementById('picker-result');
            let spins = 0;
            const interval = setInterval(() => {
                if (state.view !== 'picker' || !resEl) { clearInterval(interval); return; }
                resEl.innerText = names[Math.floor(Math.random() * names.length)];
                if (++spins >= 30) {
                    clearInterval(interval);
                    resEl.style.animation = "none";
                    resEl.style.transform = "scale(1.2)";
                    AudioService.toggle('fanfare');
                }
            }, 100);
        }
    },

    poll: {
        votes: [],
        labels: [],
        active: false,
        async setup() {
            if (this.active) { this.close(); return; }
            const input = await modal.show({
                title: 'Configurar Votação',
                html: `
                    <p style="font-size:0.9rem; opacity:0.8;">Indique o número de opções (2-6) ou escreva os nomes separados por vírgula.</p>
                    <input type="text" id="poll-setup-input" class="modal-input" placeholder="Ex: 3 ou Opção A, Opção B, Opção C" value="2">
                `
            });
            if (!input) return;
            let options = [];
            if (!isNaN(input) && input.trim() !== "") {
                const n = Math.min(Math.max(parseInt(input), 2), 6);
                for (let i = 0; i < n; i++) options.push(`Opção ${String.fromCharCode(65 + i)}`);
            } else {
                options = input.split(',').map(s => s.trim()).filter(Boolean);
            }
            if (options.length < 2) return;
            this.build(options);
        },
        build(options, isSync = false) {
            this.labels = options;
            if (!isSync) this.votes = new Array(options.length).fill(0);
            this.active = true;
            let html = '';
            options.forEach((label, i) => {
                html += `
                    <div class="poll-item" id="poll-item-${i}">
                        <div class="poll-info">
                            <div class="poll-count" id="poll-count-${i}">${this.votes[i] || 0}</div>
                            <div class="poll-label" title="${label}">${label}</div>
                            <div class="poll-btn-group">
                                <button class="poll-btn" onclick="features.poll.update(${i}, 1)">+</button>
                                <button class="poll-btn" onclick="features.poll.update(${i}, -1)">-</button>
                            </div>
                        </div>
                        <div class="poll-bar-track">
                            <div class="poll-bar-fill" id="poll-bar-${i}"></div>
                        </div>
                    </div>`;
            });
            const display = document.getElementById('poll-display');
            display.innerHTML = html;
            display.style.display = 'flex';
            document.getElementById('poll-actions').style.display = 'flex';
            if (!isSync) app.clear();
            if (!this._keyHandler) {
                this._keyHandler = (e) => {
                    if (document.activeElement.tagName === 'INPUT' || document.activeElement.contentEditable === "true") return;
                    const num = parseInt(e.key);
                    if (!isNaN(num) && num >= 1 && num <= this.labels.length) {
                        this.update(num - 1, e.shiftKey ? -1 : 1);
                    }
                };
                document.addEventListener('keydown', this._keyHandler);
            }
            this.refreshBars();
        },
        update(index, delta) {
            if (!this.active) return;
            this.votes[index] = Math.max(0, this.votes[index] + delta);
            document.getElementById(`poll-count-${index}`).innerText = this.votes[index];
            this.refreshBars();
            
            // v2: Impact Micro-interaction
            const item = document.getElementById(`poll-item-${index}`);
            item.classList.remove('poll-impact');
            void item.offsetWidth; // Trigger reflow
            item.classList.add('poll-impact');

            AudioService.toggle(delta > 0 ? 'pointUp' : 'pointDown');
            app.broadcastState();
        },
        refreshBars() {
            const maxVotes = Math.max(...this.votes, 1);
            this.votes.forEach((v, i) => {
                const percent = (v / maxVotes) * 100;
                document.getElementById(`poll-bar-${i}`).style.height = `${percent}%`;
            });
        },
        checkWinner() {
            const max = Math.max(...this.votes);
            if (max === 0) return;
            const winners = [];
            this.votes.forEach((v, i) => { if (v === max) winners.push(i); });
            
            // v2: Winner Ceremony
            document.querySelectorAll('.poll-item').forEach((el, idx) => {
                el.classList.remove('poll-winner-highlight', 'losing-option');
                if (!winners.includes(idx)) {
                    el.classList.add('losing-option');
                }
            });
            
            winners.forEach(i => { document.getElementById(`poll-item-${i}`).classList.add('poll-winner-highlight'); });
            
            AudioService.toggle('trophy');
            
            // v2: Color-coordinated Confetti
            const palette = [
                ['#FF5252', '#B71C1C', '#ffffff'], // col-1
                ['#448AFF', '#1565C0', '#ffffff'], // col-2
                ['#69F0AE', '#2E7D32', '#ffffff'], // col-3
                ['#FFD740', '#F9A825', '#ffffff'], // col-4
                ['#E040FB', '#6A1B9A', '#ffffff'], // col-5
                ['#00E5FF', '#006064', '#ffffff']  // col-6
            ];
            const winnerColors = winners.length === 1 ? palette[winners[0]] : null;
            ui.confetti(winnerColors);
            
            app.broadcastState();
        },
        close() {
            this.active = false;
            document.getElementById('poll-display').style.display = 'none';
            document.getElementById('poll-actions').style.display = 'none';
            document.removeEventListener('keydown', this._keyHandler);
            
            // Stop any active sounds (especially trophy)
            Object.keys(state.activeSounds).forEach(key => AudioService.toggle(key));
            
            app.clear();
        }
    },

    qr: {
        toggle() {
            if (state.view === 'qr') {
                if (state.history.length > 0) features.setView('text', state.history[state.historyIndex]);
                else app.clear();
            } else {
                let content = ui.els.input.innerText.trim();
                if (!content && state.view === 'text') content = ui.els.mainText.innerText;
                if (content && content !== "..." && !content.includes("Sorteando")) {
                    features.setView('qr', content);
                }
            }
        }
    },

    score: {
        async setup() {
            const sb = document.getElementById('scoreboard');
            if (sb.style.display === 'flex') { sb.style.display = 'none'; return; }
            const num = await modal.show({
                title: 'Configurar Placar',
                html: '<input type="number" class="modal-input" placeholder="Número de Equipas (2-6)" min="2" max="6" value="2">'
            });
            if (num) this.build(parseInt(num));
        },
        build(n, isSync = false) {
            if (!isSync) state.scores = {};
            let html = '';
            for (let i = 0; i < n; i++) {
                const char = String.fromCharCode(65 + i);
                if (!isSync) state.scores[char] = 0;
                const scoreVal = state.scores[char] || 0;
                html += `<div class="score-team" id="team-${char}" onmousedown="features.score.update('${char}', event)">
                            <div class="score-val" id="score-${char}">${scoreVal}</div>
                            <div class="score-label">Equipa ${char}</div>
                         </div>`;
            }
            html += `<button id="score-win-btn" onclick="features.score.checkWinner()" title="Apurar Vencedor" style="margin-left:15px; background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:50%; width:75px; height:75px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-color); transition:all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                        <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="2" fill="none">${ICONS.Target}</svg>
                     </button>`;
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = html;
            sb.style.display = 'flex';
        },
        update(team, e) {
            const delta = (e.shiftKey || e.button === 2) ? -1 : 1;
            state.scores[team] = Math.max(0, state.scores[team] + delta);
            document.getElementById(`score-${team}`).innerText = state.scores[team];
            AudioService.toggle(delta > 0 ? 'pointUp' : 'pointDown');
            app.broadcastState();
        },
        checkWinner() {
            let max = -1, winners = [];
            Object.entries(state.scores).forEach(([t, s]) => {
                if (s > max) { max = s; winners = [t]; }
                else if (s === max) winners.push(t);
            });
            document.querySelectorAll('.score-team').forEach(el => el.classList.remove('winner-highlight'));
            if (max > 0) {
                winners.forEach(t => document.getElementById(`team-${t}`).classList.add('winner-highlight'));
                AudioService.toggle('trophy');
            }
            app.broadcastState();
        }
    },

    slide: {
        activeScheme: 'default',
        active: false,
        toggleInline() {
            const toolbarColors = document.getElementById('slide-colors-toolbar');
            const drawer = document.getElementById('links-drawer');
            if (drawer.classList.contains('visible')) ui.toggleLinkMenu();
            this.active = !this.active;
            const btn = document.getElementById('btn-create-slide');
            btn.classList.toggle('active', this.active);
            if (this.active) {
                document.getElementById('control-panel').classList.add('expanded');
                toolbarColors.style.display = 'flex';
                ui.els.input.focus();
                this.setScheme(this.activeScheme);
            } else {
                toolbarColors.style.display = 'none';
                document.getElementById('control-panel').classList.remove('expanded');
                if (ui.els.input) ui.els.input.style.borderColor = '';
            }
        },
        setScheme(scheme) {
            this.activeScheme = scheme;
            document.querySelectorAll('.inline-scheme-btn').forEach(btn => btn.classList.remove('active'));
            const btn = document.getElementById(`toolbar-scheme-${scheme}`);
            if (btn) btn.classList.add('active');
            const colors = { 'default': '#FFB743', 'scheme2': '#5271FF', 'scheme3': '#35B729' };
            if (this.active && ui.els.input) ui.els.input.style.borderColor = colors[scheme] || 'var(--glass-border)';
        },
        create() {
            let text = ui.els.input.innerText;
            text = text.replace(/[\u200B-\u200D\uFEFF]/g, '').trim();
            if (!text) text = "Novo Slide";
            const data = { text: text, scheme: this.activeScheme };
            localStorage.setItem('slideData', JSON.stringify(data));
            window.location.href = 'futuro-digital.html';
        },
        openSlides() {
            const data = { text: "https://docs.google.com/presentation/d/1BR9b4cx1kMfBY3zkMFgV5BjtMpbur9K7CV6J2YUNr70/view", scheme: 'default' };
            localStorage.setItem('slideData', JSON.stringify(data));
            window.location.href = 'futuro-digital.html';
        },
        openPortal() {
            const data = { text: "bit.ly/futurodigitalcml", scheme: 'scheme2' };
            localStorage.setItem('slideData', JSON.stringify(data));
            window.location.href = 'futuro-digital.html';
        },
        openChallenge() {
            const data = { text: "bit.ly/desafiocml", scheme: 'scheme3' };
            localStorage.setItem('slideData', JSON.stringify(data));
            window.location.href = 'futuro-digital.html';
        }
    },

    ink: {
        active: false,
        isDrawing: false,
        ctx: null,
        points: [],
        _lastMidPoint: null,
        setup() {
            const canvas = document.getElementById('ink-canvas');
            if (!this.ctx) {
                this.ctx = canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
                canvas.onmousedown = (e) => this.start(e);
                canvas.onmousemove = (e) => this.draw(e);
                canvas.onmouseup = () => this.stop();
                canvas.onmouseout = () => this.stop();
                canvas.ontouchstart = (e) => { e.preventDefault(); this.start(e.touches[0]); };
                canvas.ontouchmove = (e) => { e.preventDefault(); this.draw(e.touches[0]); };
                canvas.ontouchend = () => this.stop();
            }
            this.toggle();
        },
        resize() {
            const canvas = document.getElementById('ink-canvas');
            const dpr = window.devicePixelRatio || 1;
            const temp = this.ctx ? this.ctx.getImageData(0, 0, canvas.width, canvas.height) : null;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            if (this.ctx) {
                this.ctx.scale(dpr, dpr);
                if (temp) this.ctx.putImageData(temp, 0, 0);
                this.applyBrushSettings();
            }
        },
        toggle() {
            this.active = !this.active;
            const canvas = document.getElementById('ink-canvas');
            const toolbar = document.getElementById('ink-toolbar');
            canvas.classList.toggle('active', this.active);
            toolbar.classList.toggle('visible', this.active);
            document.getElementById('btn-ink').classList.toggle('active', this.active);
            if (this.active) {
                this.resize();
                this.renderPalette();
                this.applyBrushSettings();
            }
        },
        renderPalette() {
            const container = document.getElementById('ink-palette');
            if (!container) return;
            const colors = PALETTES[state.theme] || PALETTES.dark;
            
            // Set default color if current one not in palette and not highlighter
            if (!colors.includes(state.inkColor) && !state.isInkHighlighter) {
                state.inkColor = colors[0];
            }

            container.innerHTML = colors.map(c => `
                <div class="ink-color ${state.inkColor === c ? 'active' : ''}" 
                     id="ink-col-${c.replace('#', '')}" 
                     style="background:${c};" 
                     onclick="features.ink.setColor('${c}')"></div>
            `).join('');
        },
        start(e) {
            this.isDrawing = true;
            const pt = { x: e.clientX, y: e.clientY };
            this.points = [pt];
            this._lastMidPoint = pt;
            this.drawPoint(pt);
        },
        drawPoint(pt) {
            this.ctx.beginPath();
            this.ctx.arc(pt.x, pt.y, this.ctx.lineWidth / 2, 0, Math.PI * 2);
            this.ctx.fill();
        },
        draw(e) {
            if (!this.isDrawing) return;
            const pt = { x: e.clientX, y: e.clientY };
            this.points.push(pt);

            if (this.points.length > 2) {
                const lastIdx = this.points.length - 1;
                const p1 = this.points[lastIdx - 1];
                const p2 = this.points[lastIdx];
                const midPoint = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };

                this.ctx.beginPath();
                this.ctx.moveTo(this._lastMidPoint.x, this._lastMidPoint.y);
                this.ctx.quadraticCurveTo(p1.x, p1.y, midPoint.x, midPoint.y);
                this.ctx.stroke();

                if (state.channel) {
                    state.channel.postMessage({
                        type: 'ink_stroke_v2',
                        from: this._lastMidPoint,
                        control: p1,
                        to: midPoint,
                        color: this.ctx.strokeStyle,
                        width: this.ctx.lineWidth,
                        op: this.ctx.globalCompositeOperation,
                        glow: this.ctx.shadowBlur > 0
                    });
                }
                this._lastMidPoint = midPoint;
            }
        },
        stop() { this.isDrawing = false; this.points = []; },
        applyBrushSettings() {
            if (!this.ctx) return;
            const isDark = ['dark', 'neon', 'ocean', 'sunset', 'gameboy', '8bit'].includes(state.theme);

            this.ctx.globalCompositeOperation = 'source-over';
            this.ctx.lineCap = 'round';
            this.ctx.lineJoin = 'round';

            if (state.isInkHighlighter) {
                const hex = state.inkColor;
                const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
                this.ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.35)`;
                this.ctx.lineWidth = 40;
                this.ctx.shadowBlur = 0;
            } else {
                this.ctx.strokeStyle = state.inkColor;
                this.ctx.lineWidth = 4;
                if (isDark && state.theme === 'neon') {
                    this.ctx.shadowBlur = 15;
                    this.ctx.shadowColor = state.inkColor;
                } else {
                    this.ctx.shadowBlur = 0;
                }
            }
            this.ctx.fillStyle = this.ctx.strokeStyle;
        },
        setColor(c) {
            state.inkColor = c;
            state.isInkHighlighter = false;
            this.applyBrushSettings();
            this.renderPalette();
            document.getElementById('ink-pen').classList.add('active');
            document.getElementById('ink-eraser').classList.remove('active');
            document.getElementById('ink-highlighter').classList.remove('active');
        },
        setPen() {
            state.isInkHighlighter = false;
            this.applyBrushSettings();
            document.getElementById('ink-pen').classList.add('active');
            document.getElementById('ink-highlighter').classList.remove('active');
            document.getElementById('ink-eraser').classList.remove('active');
            this.renderPalette();
        },
        setHighlighter() {
            state.isInkHighlighter = !state.isInkHighlighter;
            this.applyBrushSettings();
            document.getElementById('ink-highlighter').classList.toggle('active', state.isInkHighlighter);
            document.getElementById('ink-pen').classList.toggle('active', !state.isInkHighlighter);
            document.getElementById('ink-eraser').classList.remove('active');
        },
        setEraser() {
            this.ctx.globalCompositeOperation = 'destination-out';
            this.ctx.lineWidth = 30;
            this.ctx.shadowBlur = 0;
            document.querySelectorAll('.ink-color').forEach(el => el.classList.remove('active'));
            document.getElementById('ink-eraser').classList.add('active');
            document.getElementById('ink-pen').classList.remove('active');
            document.getElementById('ink-highlighter').classList.remove('active');
        },
        clear() {
            this.ctx.clearRect(0, 0, this.ctx.canvas.width, this.ctx.canvas.height);
            if (state.channel) state.channel.postMessage({ type: 'ink_clear' });
        }
    }
};
/* --- 6. SYNC & BROADCAST --- */

const sync = {
    broadcastState() {
        if (!state.channel) return;
        state.channel.postMessage({
            type: 'sync',
            state: {
                view: state.view,
                theme: state.theme,
                brand: state.brand,
                isSerif: state.isSerif,
                isHighlight: state.isHighlight,
                isAnimated: state.isAnimated,
                textAlignment: state.textAlignment,
                history: state.history,
                historyIndex: state.historyIndex,
                scores: state.scores,
                timerActive: !!state.timerInterval,
                pollLabels: features.poll.labels,
                pollVotes: features.poll.votes,
                pollActive: features.poll.active
            },
            data: state.view === 'text' ? ui.els.mainText.innerHTML : (state.view === 'qr' ? state.history[state.historyIndex] : null)
        });
    },

    handleBroadcast(data) {
        if (!data || typeof data !== 'object' || !data.type) return;
        const params = new URLSearchParams(window.location.search);
        const isProjector = params.get('mode') === 'projector';

        if (data.type === 'request_sync' && !isProjector) {
            this.broadcastState();
        }

        if (data.type === 'sync' && isProjector) {
            const s = data.state;
            if (!s) return;
            state.theme = s.theme || state.theme;
            state.brand = s.brand || state.brand;
            state.isSerif = !!s.isSerif;
            state.isHighlight = !!s.isHighlight;
            state.isAnimated = !!s.isAnimated;
            state.textAlignment = s.textAlignment || 'center';
            state.history = s.history || state.history;
            state.historyIndex = s.historyIndex !== undefined ? s.historyIndex : state.historyIndex;
            state.scores = s.scores || state.scores;
            ui.applyState();

            if (s.view === 'poll' && s.pollActive) {
                features.poll.votes = s.pollVotes;
                // Sanitize poll labels if they exist
                const cleanLabels = s.pollLabels ? s.pollLabels.map(l => DOMPurify.sanitize(l)) : [];
                features.poll.build(cleanLabels, true);
            } else if (s.view === 'score') {
                features.score.build(Object.keys(s.scores).length, true);
            } else {
                const cleanData = data.data ? DOMPurify.sanitize(data.data) : null;
                features.setView(s.view, cleanData);
            }
        }

        if (data.type === 'ink_stroke' && isProjector) {
            if (!features.ink.ctx) {
                const canvas = document.getElementById('ink-canvas');
                features.ink.ctx = canvas.getContext('2d');
                features.ink.resize();
            }
            features.ink.ctx.strokeStyle = data.color;
            features.ink.ctx.lineWidth = data.width;
            features.ink.ctx.globalCompositeOperation = data.op;
            features.ink.ctx.lineCap = 'round';
            features.ink.ctx.lineJoin = 'round';
            features.ink.ctx.beginPath();
            features.ink.ctx.moveTo(data.from.x, data.from.y);
            features.ink.ctx.lineTo(data.to.x, data.to.y);
            features.ink.ctx.stroke();
        }

        if (data.type === 'ink_stroke_v2' && isProjector) {
            if (!features.ink.ctx) {
                const canvas = document.getElementById('ink-canvas');
                features.ink.ctx = canvas.getContext('2d');
                features.ink.resize();
            }
            features.ink.ctx.strokeStyle = data.color;
            features.ink.ctx.lineWidth = data.width;
            features.ink.ctx.globalCompositeOperation = data.op;
            features.ink.ctx.lineCap = 'round';
            features.ink.ctx.lineJoin = 'round';

            if (data.glow) {
                features.ink.ctx.shadowBlur = 15;
                features.ink.ctx.shadowColor = data.color;
            } else {
                features.ink.ctx.shadowBlur = 0;
            }

            features.ink.ctx.beginPath();
            features.ink.ctx.moveTo(data.from.x, data.from.y);
            features.ink.ctx.quadraticCurveTo(data.control.x, data.control.y, data.to.x, data.to.y);
            features.ink.ctx.stroke();
        }

        if (data.type === 'ink_clear' && isProjector) {
            if (features.ink.ctx) features.ink.ctx.clearRect(0, 0, features.ink.ctx.canvas.width, features.ink.ctx.canvas.height);
        }
    }
};

// Aliases for compatibility with existing code calls
const broadcastState = () => sync.broadcastState();
const handleBroadcast = (data) => sync.handleBroadcast(data);
/* --- 7. MAIN CONTROLLER --- */

const app = {
    setTheme(t) { state.theme = t; localStorage.setItem('qv_theme', t); ui.applyState(); this.broadcastState(); },
    setMode(m) { state.mode = m; localStorage.setItem('qv_mode', m); ui.applyState(); this.broadcastState(); },
    setBrand(b) { state.brand = b; localStorage.setItem('qv_brand', b); ui.applyState(); this.broadcastState(); },

    processInput() {
        const val = ui.els.input.innerText.trim() ? ui.els.input.innerHTML : "";
        ui.els.input.innerHTML = "";
        if (val) this.showContent(val);
        ui.els.input.focus();
    },

    manualSubmit() {
        if (features.slide.active) {
            features.slide.create();
            return;
        }
        const text = ui.els.input.innerText.trim();
        if (!text) return;
        this.showContent(text);
        ui.els.input.innerHTML = "";
        ui.els.input.focus();
    },

    showContent(text) {
        if (state.history[state.history.length - 1] !== text) {
            state.history.push(text);
            state.historyIndex = state.history.length - 1;
        }
        features.setView('text', text);
        ui.navControls();
    },

    addToQueue() {
        const val = ui.els.input.innerText.trim() ? ui.els.input.innerHTML : "";
        if (val) {
            state.queue.push(val);
            ui.els.input.innerHTML = "";
            ui.updateQueueBadge();
            AudioService.toggle('pointUp');
        }
    },

    navHistory(dir) {
        if (dir === 'back') {
            if (state.historyIndex > 0) {
                state.historyIndex--;
                features.setView('text', state.history[state.historyIndex]);
            }
        } else {
            if (state.queue.length > 0) {
                const next = state.queue.shift();
                ui.updateQueueBadge();
                this.showContent(next);
            } else if (state.historyIndex < state.history.length - 1) {
                state.historyIndex++;
                features.setView('text', state.history[state.historyIndex]);
            }
        }
        ui.navControls();
    },

    clear() {
        features.setView('text', '');
        ui.els.mainText.classList.remove('visible');
        this.broadcastState();
    },

    broadcastState() {
        sync.broadcastState();
    },

    handleBroadcast(data) {
        sync.handleBroadcast(data);
    }
};

// INIT
window.addEventListener('load', () => ui.init());
</script>
